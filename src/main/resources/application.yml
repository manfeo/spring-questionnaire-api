spring:
  application:
    name: questionnaireDemo
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        search:
          backend:
            type: lucene
            lucene_version: LATEST
            directory.root: ${LUCENE_INDEX_PATH:./data/index}
            analysis:
              configurer: com.example.questionnaire_demo.config.QuestionnaireAnalysisConfigurer
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.example.questionnaire_demo.controller